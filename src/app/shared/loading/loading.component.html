<div class="loading-container" *ngIf="isLoading">
  <div class="loading-backdrop"></div>
  <div class="loading-content">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
    </div>
    <p class="loading-text">{{ message || 'Loading...' }}</p>
  </div>
</div>
