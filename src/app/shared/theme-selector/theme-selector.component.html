<div class="theme-selector">
  <button 
    class="theme-toggle" 
    (click)="toggleThemeSelector()"
    title="Change theme"
    aria-label="Theme selector"
    [attr.aria-expanded]="isOpen">
    <i class="fas fa-palette"></i>
  </button>
  
  <div class="theme-dropdown" *ngIf="isOpen" [@fadeInOut]>
    <div class="theme-options">
      <div 
        *ngFor="let theme of availableThemes" 
        class="theme-option"
        [class.active]="theme.name === currentTheme"
        (click)="selectTheme(theme.name)"
        [title]="'Switch to ' + theme.displayName">
        
        <div class="theme-preview">
          <div class="theme-colors">
            <div class="color-dot" [style.background-color]="theme.colors.primary"></div>
            <div class="color-dot" [style.background-color]="theme.colors.secondary"></div>
            <div class="color-dot" [style.background-color]="theme.colors.accent"></div>
          </div>
        </div>
        
        <span class="theme-name">{{ theme.displayName }}</span>
        
        <i class="fas fa-check" *ngIf="theme.name === currentTheme"></i>
      </div>
    </div>
  </div>
</div>
