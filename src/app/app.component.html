<!-- Shared UI Components -->
<app-loading [isLoading]="isLoading"></app-loading>
<app-notification [notification]="notification" (close)="onNotificationClose()"></app-notification>

<div class="theme-selector-container">
  <app-theme-selector></app-theme-selector>
</div>

<div class="main-container">
  <nav class="nav-container glass-effect">
    <div class="nav-content">
      <a routerLink="/home" class="nav-logo">
        <span class="logo-mark">AS</span>
        <span class="logo-text">Adham Soliman</span>
      </a>
      <div class="nav-links" [class.open]="mobileOpen">
        <a routerLink="/home" class="nav-link" routerLinkActive="active" (click)="closeMobile()">Home</a>
        <a routerLink="/about" class="nav-link" routerLinkActive="active" (click)="closeMobile()">About</a>
        <a routerLink="/projects" class="nav-link" routerLinkActive="active" (click)="closeMobile()">Projects</a>
        <a routerLink="/skills" class="nav-link" routerLinkActive="active" (click)="closeMobile()">Skills</a>
        <a routerLink="/cv" class="nav-link" routerLinkActive="active" (click)="closeMobile()">CV</a>
        <a routerLink="/contact" class="nav-link" routerLinkActive="active" (click)="closeMobile()">Contact</a>
      </div>
      <button type="button" class="mobile-toggle" (click)="toggleMobile()" [attr.aria-expanded]="mobileOpen" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main class="main-content" [@routeAnimations]="o?.activatedRouteData?.['animation']">
    <router-outlet #o="outlet"></router-outlet>
  </main>

  <footer class="footer-container glass-effect">
    <div class="footer-content">
      <div class="footer-left">
        <p class="footer-name">Adham Soliman</p>
        <p class="footer-role">Full-Stack Engineer · Java / Spring Boot</p>
      </div>
      <div class="footer-center">
        <p>&copy; 2026 Adham Soliman. All rights reserved.</p>
      </div>
      <div class="footer-right">
        <div class="social-links">
          <a href="https://linkedin.com/in/adham-soliman9" target="_blank" rel="noopener noreferrer" title="LinkedIn" class="social-link">
            <i class="fab fa-linkedin"></i>
          </a>
          <a href="mailto:adhamsoliman12199@gmail.com" title="Email" class="social-link">
            <i class="fas fa-envelope"></i>
          </a>
        </div>
      </div>
    </div>
  </footer>
</div>
